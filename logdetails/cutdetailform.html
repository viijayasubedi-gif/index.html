<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTI Data Entry Form</title>
    <style>
        :root { --primary: #4d662b; --bg: #f4f6f1; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 5px 15px 15px 15px; display: flex; flex-direction: column; align-items: center; }
        .container { background: #ffffff; max-width: 400px; width: 100%; padding: 8px 15px 15px 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.30); border-top: 5px solid var(--primary); box-sizing: border-box; }
        h2 { color: var(--primary); margin-top: 0; margin-bottom: 2px; text-align: center; border-bottom: 0px solid var(--primary); padding-bottom: 0px;font-size: 16px;}
        .form-group { margin-bottom: 3px;display: flex; align-items: center; gap: 4px; }
        label { font-weight: 600; color: #333; font-size: 12px; white-space: nowrap; width: 100px;}

        input[type="text"], input[type="number"], select { flex: 1; min-width: 0; padding: 3px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 12px; height: 24px; }

        .row { display: flex; flex-direction: column; gap: 0;}
        .col { flex: 1; min-width: 0; }
        .btn { display: block; width: 100%; padding: 5px; font-size: 11px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; margin-top: 5px; text-align: center; text-transform: uppercase; }
        .btn-submit { background-color: var(--primary); color: white; }
        .btn-export { background-color: #0078d4; color: white; }
        .counter { text-align: center; font-weight: bold; margin: -4px 0px 2px 0; color: #333; background: #d4edda; padding: 4px; border-radius: 4px; font-size: 11px; }
        .preview-box { width: 100%; height: 40px; margin-top: 5px; font-family: monospace; font-size: 10px; padding: 5px; border: 1px solid #ccc; background: #fafafa; box-sizing: border-box; resize: none; }
        @media (max-width: 480px) { .row { flex-direction: column; gap: 0; } }
    </style>
</head>
<body>

<div class="container">
    <h2>🌲 VTI Data Entry</h2>

    <div id="entryCounter" class="counter">Total Records: 0</div>

    <form id="forestForm" onsubmit="return false;">
        <div class="row">
            <div class="form-group col"><label>Forest</label><input type="text" id="forest" placeholder="e.g., CF/ARG/DB/39/01"></div>
            <div class="form-group col"><label>ChDate</label><input type="text" id="chdate" placeholder="e.g., 2079/01/16q"></div>
        </div>
        <div class="row">
            <div class="form-group col"><label>Fiscal Year</label><input type="text" id="fyear" placeholder="e.g., 2078/080"></div>
            <div class="form-group col"><label>Hammer</label><input type="text" id="hammer" placeholder="e.g., BB185KA"></div>
        </div>
        <div class="row">
            <div class="form-group col"><label>Plot</label><input type="text" id="plot" placeholder="e.g., C1S2"></div>
            <div class="form-group col"><label>Chhapan</label><input type="number" id="chhapan" placeholder="e.g., 1"></div>
        </div>
        <div class="row">
            <div class="form-group col"><label>TN</label><input type="number" id="tn" placeholder="e.g., 450"></div>
            <div class="form-group col">
                <label>Species</label>
                <select id="spp">
                    <option value="">Loading list...</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="form-group col">
                <label>GPS</label>
                <input type="text" id="gps" placeholder="Tap 📍 to capture" readonly>
                <button type="button" id="gpsBtn" style="width:auto; padding:3px 10px; font-size:11px; font-weight:bold; background-color:#0078d4; color:white; border:none; border-radius:4px; cursor:pointer; white-space:nowrap;">📍</button>
            </div>
        </div>
        <div class="row">
            <div class="form-group col"><label>Girth</label><input type="number" id="girth" step="any" placeholder="e.g., 214"></div>
            <div class="form-group col"><label>Ht</label><input type="number" id="ht" step="any" placeholder="e.g., 20"></div>
        </div>
        <div class="row">
            <div class="form-group col"><label>Cls</label><input type="number" id="cls" placeholder="e.g., 1"></div>
            <div class="form-group col"><label>Type</label><input type="text" id="type" placeholder="e.g., RF"></div>
        </div>
        <div class="row">
            <div class="form-group col"><label>Re</label><input type="text" id="re" placeholder="e.g., Bulges"></div>
            <div class="form-group col"><label>VTI</label><input type="text" id="vti" placeholder="e.g., Sal"></div>
        </div>

<div class="form-group col" style="background:#f9fbf7; border:1px dashed var(--primary); padding:4px; border-radius:4px; display: flex; justify-content: flex-start; gap: 4px;">
    <label for="photoFile" style="width: auto; min-width: 70px;">📸 Photo</label>
    <input type="file" id="photoFile" accept="image/*" capture="environment">
</div>


 <button type="button" class="btn btn-submit" id="saveBtn">💾 Save Record</button>
    </form>
    <label style="margin-top:5px; font-weight:bold; display:block;">Current Batch Data Preview:</label>
    <textarea id="dataPreview" class="preview-box" readonly placeholder="No data saved in this batch yet."></textarea>
    <button type="button" class="btn btn-export" id="exportBtn">📤 Export all-CSV</button>
</div>
<script>
    // 1. Initial configuration and safe startup initialization
    const headers = ["Forest", "ChDate", "FYear", "Hammer", "Plot", "Chhapan", "TN", "Spp", "GPS", "Girth", "Ht", "Cls", "Type", "cTstamp", "Re", "VTI", "PhotoLink"];
    let runtimeRecords = [];

    // Safely parse existing items from local browser memory on page boot
    try {
        const storedData = localStorage.getItem('vti_batch_data');
        if (storedData) {
            runtimeRecords = JSON.parse(storedData) || [];
        }
    } catch (e) {
        console.error("Could not read local storage records:", e);
        runtimeRecords = [];
    }

    // Function to calculate and apply the next increment values
    function applyAutoIncrements() {
        let nextIndex = runtimeRecords.length + 1;

        let chhapanField = document.getElementById('chhapan');
        let tnField = document.getElementById('tn');

        if (chhapanField) chhapanField.value = nextIndex;
        if (tnField) tnField.value = nextIndex;
    }

    // Fetch species.txt and auto-retain last choice
    function loadSpeciesAndRetainChoice() {
        fetch('species.txt')
            .then(response => {
                if (!response.ok) throw new Error('File not found');
                return response.text();
            })
            .then(textData => {
                const dropdown = document.getElementById('spp');
                dropdown.innerHTML = '<option value="">-- Select Species --</option>';

                const speciesList = textData.split(/\r?\n/).filter(line => line.trim() !== '');
                speciesList.forEach(speciesName => {
                    const option = document.createElement('option');
                    option.value = speciesName.trim();
                    option.textContent = speciesName.trim();
                    dropdown.appendChild(option);
                });

                if (runtimeRecords && runtimeRecords.length > 0) {
                    const lastRecord = runtimeRecords[runtimeRecords.length - 1];
                    if (lastRecord.Spp) {
                        dropdown.value = lastRecord.Spp;
                    }
                }
            })
            .catch(error => {
                console.error("Error reading species.txt:", error);
                const dropdown = document.getElementById('spp');
                dropdown.innerHTML = '<option value="">⚠️ Error loading species list</option>';
            });
    }

    // Capture device GPS coordinates (Android/Chrome geolocation) into the GPS field
    function captureGPS() {
        const gpsField = document.getElementById('gps');
        const btn = document.getElementById('gpsBtn');

        if (!navigator.geolocation) {
            alert("⚠️ GPS is not supported on this device/browser.");
            return;
        }

        btn.disabled = true;
        const originalLabel = btn.innerText;
        btn.innerText = "⏳";

        navigator.geolocation.getCurrentPosition(
            function(position) {
                const lat = position.coords.latitude.toFixed(6);
                const lon = position.coords.longitude.toFixed(6);
                gpsField.value = lat + ", " + lon;
                btn.disabled = false;
                btn.innerText = originalLabel;
            },
            function(error) {
                alert("⚠️ Could not get GPS location: " + error.message + "\n\nMake sure location access is allowed for this page.");
                btn.disabled = false;
                btn.innerText = originalLabel;
            },
            { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
        );
    }

    // Helper: build the standard photo filename for a record (forest-Chhapan-Timestamp.ext)
    function buildPhotoFilename(file) {
        let originalName = file.name;
        let dotIndex = originalName.lastIndexOf('.');
        let ext = dotIndex >= 0 ? originalName.substring(dotIndex).toLowerCase() : "";
        if (!ext || ext.length > 5) ext = ".jpg";

        let forestRaw = document.getElementById('forest') ? document.getElementById('forest').value.trim().toLowerCase() : 'forest';
        let forestClean = forestRaw.replace(/[^a-z0-9]/g, '');
        if (!forestClean) forestClean = 'forest';

        let chhapanValue = document.getElementById('chhapan') ? document.getElementById('chhapan').value : '1';

        let now = new Date();
        let mo = String(now.getMonth() + 1).padStart(2, '0');
        let dy = String(now.getDate()).padStart(2, '0');
        let hr = String(now.getHours()).padStart(2, '0');
        let mn = String(now.getMinutes()).padStart(2, '0');
        let sc = String(now.getSeconds()).padStart(2, '0');
        let compactTime = mo + dy + hr + mn + sc;

        return forestClean + "-" + chhapanValue + "-" + compactTime + ext;
    }

    // Helper: trigger an actual download of the photo file to the device, using the standard filename
    function savePhotoToDevice(file, filename) {
        try {
            let objectUrl = URL.createObjectURL(file);
            let link = document.createElement("a");
            link.href = objectUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            // Revoke shortly after to free memory, once the browser has started the download
            setTimeout(() => URL.revokeObjectURL(objectUrl), 2000);
        } catch (e) {
            console.error("Could not save photo to device:", e);
        }
    }

    // CSV field escaping helper (handles embedded quotes/commas/newlines)
    function csvEscape(value) {
        let str = (value === undefined || value === null) ? '' : String(value);
        return '"' + str.replace(/"/g, '""') + '"';
    }

    // Window Onload: populate species list, refresh preview/counter
    window.onload = function() {
        loadSpeciesAndRetainChoice();
        const gpsBtn = document.getElementById('gpsBtn');
        if (gpsBtn) gpsBtn.addEventListener('click', captureGPS);
        if (runtimeRecords && runtimeRecords.length > 0) {
            document.getElementById('entryCounter').innerHTML = "Total Records: " + runtimeRecords.length;
            let displayLines = [];
            for (let i = 0; i < runtimeRecords.length; i++) {
                displayLines.push("Forest: " + runtimeRecords[i].Forest + " | Plot: " + runtimeRecords[i].Plot + " | Chhapan: " + runtimeRecords[i].Chhapan);
            }
            document.getElementById('dataPreview').value = displayLines.join("\n");
        }
        applyAutoIncrements();
    };

    // 3. Save Record Button Functionality (with custom validation)
    document.getElementById('saveBtn').onclick = function() {
        const requiredFields = [
            { id: 'forest', name: 'Forest' },
            { id: 'chdate', name: 'ChDate' },
            { id: 'fyear', name: 'Fiscal Year' },
            { id: 'hammer', name: 'Hammer' },
            { id: 'plot', name: 'Plot' },
            { id: 'chhapan', name: 'Chhapan' },
            { id: 'tn', name: 'TN' },
            { id: 'spp', name: 'Species' },
            { id: 'gps', name: 'GPS' },
            { id: 'girth', name: 'Girth' },
            { id: 'ht', name: 'Ht' },
            { id: 'cls', name: 'Cls' },
            { id: 'type', name: 'Type' }
        ];

        for (let i = 0; i < requiredFields.length; i++) {
            let field = document.getElementById(requiredFields[i].id);
            if (!field || !field.value.toString().trim()) {
                alert("⚠️ Please enter the " + requiredFields[i].name + " field!");
                if (field) field.focus();
                return;
            }
        }

        // Handle photo: compute filename once, save actual file to device, reuse the name in the record
        let photoFilename = "";
        let fileInput = document.getElementById('photoFile');
        if (fileInput && fileInput.files && fileInput.files.length > 0) {
            let file = fileInput.files[0];
            photoFilename = buildPhotoFilename(file);
            savePhotoToDevice(file, photoFilename);
        }

        // --- ACTUAL SAVE LOGIC ---
        let newRecord = {};
        headers.forEach(h => {
            let elId = h.toLowerCase();

            if (h === 'PhotoLink') {
                newRecord[h] = photoFilename;
            } else if (elId === 'ctstamp') {
                newRecord[h] = new Date().toLocaleString();
            } else {
                let element = document.getElementById(elId);
                newRecord[h] = element ? element.value.trim() : "";
            }
        });

        runtimeRecords.push(newRecord);

        try {
            localStorage.setItem('vti_batch_data', JSON.stringify(runtimeRecords));
        } catch (e) {
            console.error("Local storage update error", e);
        }

        document.getElementById('entryCounter').innerHTML = "Total Records: " + runtimeRecords.length;

        let displayLines = [];
        for (let i = 0; i < runtimeRecords.length; i++) {
            displayLines.push("Forest: " + runtimeRecords[i].Forest + " | Plot: " + runtimeRecords[i].Plot + " | Chhapan: " + runtimeRecords[i].Chhapan);
        }
        document.getElementById('dataPreview').value = displayLines.join("\n");

        // Clear ONLY the per-tree changing values (keep Forest/ChDate/FYear/Hammer/Plot/Type as carried-over batch context)
        const clearTargets = ['gps', 'girth', 'ht', 'cls', 're', 'vti', 'photoFile'];
        clearTargets.forEach(id => {
            let inputEl = document.getElementById(id);
            if (inputEl) inputEl.value = "";
        });

        applyAutoIncrements();

        let nextFocus = document.getElementById('girth');
        if (nextFocus) nextFocus.focus();
    };

    // 4. Export CSV button mapping framework with dynamic VTI_DateTime naming
    document.getElementById('exportBtn').onclick = function() {
        if (runtimeRecords.length === 0) {
            alert("⚠️ No records found to export!");
            return;
        }

        let clearMemory = confirm("📥 Export Data Batch?\n\nClicking OK will export your CSV file and safely CLEAR all temporary data from your browser memory.");

        if (!clearMemory) {
            return;
        }

        let today = new Date();
        let year = today.getFullYear();
        let month = String(today.getMonth() + 1).padStart(2, '0');
        let day = String(today.getDate()).padStart(2, '0');

        let hours = String(today.getHours()).padStart(2, '0');
        let minutes = String(today.getMinutes()).padStart(2, '0');
        let seconds = String(today.getSeconds()).padStart(2, '0');

        let dynamicFileName = "VTI_" + year + month + day + "_" + hours + minutes + seconds + ".csv";

        // Properly escaped CSV (handles embedded quotes/commas/newlines in any field)
        let csvContent = "data:text/csv;charset=utf-8,"
            + headers.map(csvEscape).join(",") + "\n"
            + runtimeRecords.map(r => headers.map(h => csvEscape(r[h])).join(",")).join("\n");

        let encodedUri = encodeURI(csvContent);
        let link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", dynamicFileName);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        runtimeRecords = [];
        localStorage.removeItem('vti_batch_data');

        document.getElementById('entryCounter').innerHTML = "Total Records: 0";
        document.getElementById('dataPreview').value = "";

        applyAutoIncrements();

        setTimeout(function() {
            alert("🧹 Batch exported and temporary cache memory successfully cleared!");
        }, 300);
    };

</script>
</body>
</html>
